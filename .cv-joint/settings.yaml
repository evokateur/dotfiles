chat:
  model: gpt-4o
  temperature: 0.7
mcpServers:
  rag-knowledge:
    command: ~/.local/bin/uv
    args:
      - run
      - --directory
      - ~/code/rag-knowledge-mcp
      - python
      - rag_knowledge_mcp.py
    env:
      LOG_LEVEL: INFO
    x-tool-name: rag_search_knowledge
crews:
  cv_analysis:
    agents:
      cv_analyst:
        model: gpt-4o
        temperature: 0.7
  job_posting_analysis:
    agents:
      job_analyst:
        model: gpt-4o
        temperature: 0.7
  cv_optimization:
    agents:
      cv_strategist:
        model: "claude-sonnet-4-20250514"
      cv_rewriter:
        model: "claude-sonnet-4-20250514"
repositories:
  filesystem:
    data_dir: "~/vaults/caveau/areas/job-search/cv-joint"
